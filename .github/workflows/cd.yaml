# .github/workflows/cd.yml
name: CD - Deploy

on:
  workflow_run:
    workflows: ["CI - Build and Push Image"]
    branches: [main, staging, dev]
    types:
      - completed

jobs:
  # This job acts as the gate — it checks if CI passed
  # and keeps the deploy job queued until CI is done
  wait-for-ci:
    name: Waiting for CI to complete...
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed — proceeding to deploy
        run: echo "CI completed successfully. Starting deployment..."

  # Deploy only runs after wait-for-ci passes
  deploy:
    name: Deploy to ${{ github.event.workflow_run.head_branch }}
    runs-on: ubuntu-latest
    needs: wait-for-ci
    environment: ${{ github.event.workflow_run.head_branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag
        id: vars
        run: echo "SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Copy prod compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yaml"
          target: "/opt/amazon-clone/"

      - name: Deploy to ${{ github.event.workflow_run.head_branch }} server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/amazon-clone

            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            export IMAGE_TAG=sha-${{ steps.vars.outputs.SHA }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            docker compose -f docker-compose.prod.yaml pull
            docker compose -f docker-compose.prod.yaml up -d --force-recreate
            docker image prune -f
  