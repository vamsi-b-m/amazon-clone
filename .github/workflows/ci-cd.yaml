name: CI/CD Pipeline

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging]

jobs:
  build-and-push:
    name: CI - Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: api-gateway
            use_cache: true
          - service: user-service
            use_cache: true
          - service: product-service
            use_cache: true
          - service: cart-service
            use_cache: true
          - service: order-service
            use_cache: true
          - service: notification-service
            use_cache: true
          - service: frontend
            use_cache: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/amazon-clone-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'frontend' && './frontend' || format('./services/{0}', matrix.service) }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: ${{ !matrix.use_cache }}
          cache-from: ${{ matrix.use_cache && 'type=gha' || '' }}
          cache-to: ${{ matrix.use_cache && 'type=gha,mode=max' || '' }}

  deploy:
    name: CD - Deploy to ${{ github.ref_name }}
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.event_name != 'pull_request' &&
      (
        github.ref == 'refs/heads/dev' ||
        github.ref == 'refs/heads/staging' ||
        github.ref == 'refs/heads/main'
      )
    environment: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Copy prod compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yaml"
          target: "/opt/amazon-clone/"

      - name: Deploy to ${{ github.ref_name }} server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/amazon-clone

            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Pass the branch name so compose pulls the right tag
            export DEPLOY_ENV=${{ github.ref_name }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}

            docker compose -f docker-compose.prod.yaml pull
            docker compose -f docker-compose.prod.yaml up -d --force-recreate
            docker image prune -f
